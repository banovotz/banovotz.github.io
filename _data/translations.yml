- title: Luna je okrutna ljubavnica
  author: Robert A. Heinlein
  meta: 2002. • Zagrebačka naklada
  description: >-
    Jedan od najutjecajnijih romana znanstvene fantastike koji prikazuje pobunu
    lunarne kolonije protiv Zemlje. Prijevod zahtijeva vjerno prenošenje
    složenih političkih i društvenih koncepata te osebujnog lunarnog dijalekta,
    čija je jezična dosljednost ključna za autentičnost svijeta i
    karakterizaciju likova.
  link: >-
    https://katalog.kgz.hr/pagesresults/bibliografskiZapis.aspx?selectedId=5009585
  image_path: /assets/images/luna.jpeg
- title: Dagon i druge priče
  author: H.P. Lovecraft
  meta: 2006. • Plava rijeka
  description: >-
    Zbirka Lovecraftovih kratkih priča čiji prijevod predstavlja poseban
    prevoditeljski izazov zbog potrebe da se na hrvatskom jeziku očuvaju autorov
    prepoznatljiv gusti stil, hladna i tjeskobna atmosfera te suptilno
    ritmizirano građenje napetosti koje njegovoj prozi daje jedinstvenu snagu.
  link: >-
    https://katalog.kgz.hr/pagesResults/bibliografskiZapis.aspx?&selectedId=93000734
  image_path: /assets/images/dagon.jpeg
- title: Živjeti kao ljubljeni
  author: Henri J. M. Nouwen
  meta: 2006 .• Kršćanska sadašnjost
  description: >-
    Filozofsko-duhovni tekst koji propituje položaj duhovnosti u sekulariziranom
    svijetu. Prijevod zahtijeva precizno prenošenje apstraktnih filozofskih i
    teoloških pojmova uz očuvanje smirenog, refleksivnog, pa i kolokvijalog tona
    koji obilježava autorov stil.
  link: '#'
  image_path: /assets/images/ljubljeni.jpg
