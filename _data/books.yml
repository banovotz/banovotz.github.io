- title: Južni krajevi
  tagline: Granice su bliže nego što misliš...
  description: >-
    Slučajno otkriće napisa iz Drugog svjetskog rata na zidu ruševne lugarske
    kuće na Baranjskoj planini pokreće lančanu reakciju događaja koji se protežu
    stoljećima, prelazeći ponekad nevidljive granice između naroda i politika,
    stvarnosti i narativa, razuma i bezumlja… Radnju pratimo kroz isprepletene
    niti povijesti, tehnologije i misterija ljudskog uma. Glavni likovi,
    predvođeni profesorom teorijske fizike Naumom Špeharom, upleteni su u
    složenu mrežu spoznaja, tajni i izigranih ideala, a svima se putovi
    isprepliću na zagonetnom Proplanku, brdu obavijenom stvarnim legendama i
    instant mitovima. Svojom jedinstvenom mješavinom povijesne fikcije, avanture
    i društvenih komentara ovaj je roman nezaobilazno štivo za ljubitelje autora
    poput Umberta Eca i Predraga Raosa.
  image_path: /assets/images/juzni-krajevi.jpg
  cta_link: 'https://www.hocuknjigu.hr/proizvodi/knjige/knjizevnost/drama/juzni-krajevi'
  cover_alt: Južni krajevi book cover
- title: Girl with Broken Umbrella
  tagline: What do art and terrorism have in common?
  description: >-
    Ana is a journalist who discovers an important manuscript and a gifted
    cartoonist whose life is in danger. David is a philosopher and an author of
    a story collection about the war in Bosnia. Boris is an innovative artist.
    Fabian – a future cleric. Pierre is a friend. Their stories are not
    ordinary. Everything about their lives is mysteriously connected with other
    people, and distant times and places. Every detail has many meanings, and
    their paths are defined by those meanings.


    Disguised as the main characters’ journey through the time and places, this
    actually is a fascinating semantic journey. Things around you will never
    look the same again.
  image_path: /assets/images/brumbrella.jpg
  cta_link: 'https://www.brokenumbrella.eu/'
  cover_alt: Girl with Broken Umbrella book cover
